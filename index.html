<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorasaki System - Status & Estatísticas</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a0a0c; color: #fff; padding: 40px; text-align: center; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { color: #00e676; font-size: 2.5em; margin-bottom: 5px; }
        .sub { color: #888; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card { background: #141419; padding: 20px; border-radius: 12px; border: 1px solid #222; text-align: left; transition: 0.3s ease; }
        .card h3 { margin: 0 0 10px 0; color: #888; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; }
        .card p { margin: 0; font-size: 1.4em; font-weight: bold; }
        .status-online { color: #00e676; }
        .status-offline { color: #f44336; }
        .dev-tag { margin-top: 40px; font-size: 0.9em; color: #555; }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="bot-nome">Sorasaki System</h1>
        <p class="sub">Painel Oficial de Monitoramento e Performance</p>

        <div class="grid">
            <div class="card">
                <h3>Status do Sistema</h3>
                <p id="status" class="status-offline">Buscando...</p>
            </div>
            <div class="card">
                <h3>Tempo Ativo (Uptime)</h3>
                <p id="uptime">--h --m --s</p>
            </div>
            <div class="card">
                <h3>Criador / Desenvolvedor</h3>
                <p id="criador">Buscando...</p>
            </div>
            <div class="card">
                <h3>Comandos Prontos</h3>
                <p id="comandos">--</p>
            </div>
        </div>

        <p class="dev-tag">Sorasaki System v<span id="versao">0.0</span> • Hospedagem Nuvem Ativa</p>
    </div>

    <script>
        // Quando você hospedar seu bot na nuvem (Render, Railway, VPS), mude para a URL pública gerada
        // Enquanto testa no Termux/PC com o bot ligado, use http://localhost:3000/api/stats
        const URL_API = "http://localhost:3000/api/stats";

        function formatarUptime(ms) {
            if (isNaN(ms) || ms <= 0) return "00d 00h 00m 00s";
            
            let segundos = Math.floor(ms / 1000);
            let minutos = Math.floor(segundos / 60);
            segundos %= 60;
            let horas = Math.floor(minutos / 60);
            minutos %= 60;
            let dias = Math.floor(horas / 24);
            horas %= 24;

            return `${dias}d ${horas}h ${minutos}m ${segundos}s`;
        }

        async function atualizarDados() {
            try {
                const resposta = await fetch(URL_API);
                if (!resposta.ok) throw new Error("Erro de resposta do servidor");
                
                const dados = await resposta.json();

                document.getElementById("bot-nome").innerText = dados.nomeBot || "Sorasaki System";
                document.getElementById("versao").innerText = dados.versao || "4.00";
                document.getElementById("criador").innerText = dados.criador || "NOJX IVAD ⁷⁷⁷";
                document.getElementById("comandos").innerText = dados.comandosCarregados !== undefined ? dados.comandosCarregados : "0";
                
                const statusEl = document.getElementById("status");
                if (dados.status === "online") {
                    statusEl.innerText = "● ONLINE";
                    statusEl.className = "status-online";
                } else {
                    statusEl.innerText = "○ OFFLINE";
                    statusEl.className = "status-offline";
                    document.getElementById("uptime").innerText = "00d 00h 00m 00s";
                }

                if (dados.status === "online") {
                    document.getElementById("uptime").innerText = formatarUptime(dados.uptime);
                }

            } catch (erro) {
                // Caso o servidor caia ou não responda, define o layout de offline com segurança
                const statusEl = document.getElementById("status");
                statusEl.innerText = "○ OFFLINE";
                statusEl.className = "status-offline";
                document.getElementById("uptime").innerText = "--h --m --s";
                document.getElementById("comandos").innerText = "--";
            }
        }

        // Faz requisições suaves a cada 2 segundos para atualizar o Uptime sem travar o navegador
        setInterval(atualizarDados, 2000);
        
        // Primeira execução imediata ao carregar a página
        atualizarDados();
    </script>
</body>
</html>
